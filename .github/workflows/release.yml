name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Version gegen module.json pruefen
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VERSION=$(python3 -c "import json; print(json.load(open('module.json'))['version'])")
          if [ "$TAG" != "$VERSION" ]; then echo "Tag $TAG != module.json $VERSION"; exit 1; fi
      - name: Build module ZIP (Ordner AiAssist/ im Root, wie FreeScout ihn erwartet)
        run: |
          mkdir -p /tmp/build/AiAssist
          rsync -a --exclude='.git' --exclude='.github' --exclude='vendor' --exclude='tests' \
            --exclude='composer.json' --exclude='composer.lock' --exclude='phpunit.xml' \
            --exclude='.gitignore' --exclude='.phpunit.result.cache' ./ /tmp/build/AiAssist/
          cd /tmp/build && zip -rq AiAssist.zip AiAssist
      - name: Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/build/AiAssist.zip
          generate_release_notes: true
